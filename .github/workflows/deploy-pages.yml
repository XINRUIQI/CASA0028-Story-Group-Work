# CI + Deploy
# Runs lint & data API checks on every push / PR to main or QXR.
# On push (not PR), also builds and deploys static viz to GitHub Pages.
#
# Setup (one-time):
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Optional: NEXT_PUBLIC_API_BASE in Actions → Variables = deployed API URL
#   (only if you need a live backend; otherwise the build uses /static-data only)

name: CI / Deploy

on:
  push:
    branches: [main, QXR, lhx]
  pull_request:
    branches: [main, QXR, lhx]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── CI checks ──────────────────────────────────────────
  lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viz/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data/requirements.txt

      - name: Verify imports
        run: python -c "from data.main import app; print('OK:', app.title)"

      - name: Compile backend package
        run: python -m compileall -q data

  # ── Build & Deploy (only on push / manual, after CI passes) ──
  build:
    name: Build static site
    needs: [lint, backend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viz/package-lock.json

      - name: Install dependencies
        working-directory: viz
        run: npm ci

      - name: Build static export
        working-directory: viz
        env:
          STATIC_EXPORT: "true"
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.eyJ1Ijoic2hpcmx5cXhyIiwiYSI6ImNtbnViemZmaTBybXkyb3M0cm8wMTh6enUifQ.Z-BZBDMeLZMU4YMJwtZ60Q
        run: npm run build

      - name: Verify output
        run: |
          echo "Static files generated:"
          ls -lh viz/out/*.html
          echo "Total size: $(du -sh viz/out | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viz/out

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
