# Deploy static frontend to GitHub Pages
# Triggers automatically on push to QXR branch
#
# Setup (one-time):
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Optional:
#   Repo → Settings → Secrets and variables → Actions → Variables
#   Add NEXT_PUBLIC_API_BASE = your deployed backend URL (e.g. https://your-api.fly.dev)

name: Deploy to GitHub Pages

on:
  push:
    branches: [QXR]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          STATIC_EXPORT: "true"
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
        run: npm run build

      - name: Verify output
        run: |
          echo "Static files generated:"
          ls -lh frontend/out/*.html
          echo "Total size: $(du -sh frontend/out | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
